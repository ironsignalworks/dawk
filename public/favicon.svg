  <!-- Subtle emerald border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>
  <!-- Activity / EKG waveform icon (lucide Activity path, scaled to fit) -->
